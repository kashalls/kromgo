---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release

on:
  push:
    branches:
      - main
  release:
    types:
      - published

jobs:
  versions:
    name: Versions
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      go-version: ${{ steps.versions.outputs.go-version }}
      node-version: ${{ steps.versions.outputs.node-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: false
          experimental: true
          install: false

      - name: Resolve versions
        id: versions
        run: |
          echo "go-version=$(mise config get tools.go)" >> "$GITHUB_OUTPUT"
          echo "node-version=$(mise config get tools.node)" >> "$GITHUB_OUTPUT"

  release:
    name: Release
    needs: versions
    permissions:
      contents: read
      id-token: write
      packages: write
    uses: docker/github-builder/.github/workflows/build.yml@70ac3fc303efa83d2b94905e6ab78bb83cbdc2ae # v1.11.0
    with:
      build-args: |
        VERSION=${{ github.ref_name }}
        REVISION=${{ github.sha }}
        GO_VERSION=${{ needs.versions.outputs.go-version }}
        NODE_VERSION=${{ needs.versions.outputs.node-version }}
      cache: true
      meta-images: ghcr.io/${{ github.repository }}
      meta-tags: |
        type=semver,pattern={{version}}
        type=raw,value=rolling,enable=${{ github.event_name == 'release' }}
        type=ref,event=branch
      output: image
      platforms: linux/amd64,linux/arm64
      push: true
      sbom: true
      sign: true
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  helm:
    name: Helm
    needs: release
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      VERSION: ${{ github.event.release.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: false # publishing job — avoid restoring a poisonable cache
          experimental: true
          install_args: --locked

      # Pin the chart's image to the exact digest the build just published, so the
      # released chart references an immutable image (not a floating tag). The digest
      # is the manifest-list (index) digest from docker/github-builder; fail closed
      # rather than ship a chart that silently falls back to the tag.
      - name: Pin the released image digest into the chart
        env:
          DIGEST: ${{ needs.release.outputs.digest }}
        run: |
          [ -n "${DIGEST}" ] || { echo "build produced no digest"; exit 1; }
          yq -i '.image.digest = strenv(DIGEST)' charts/kromgo/values.yaml

      - name: Package Helm chart
        run: |
          helm package charts/kromgo \
            --version "${VERSION}" \
            --app-version "${VERSION}"

      - name: Log in to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Helm chart to GHCR (OCI)
        run: |-
          helm push "kromgo-${VERSION}.tgz" "oci://ghcr.io/${{ github.repository_owner }}/charts"
