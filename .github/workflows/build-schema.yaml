---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "YAML Schema"

on:
  push:
    branches: ["main"]

jobs:
  build-schema:
    name: Build YAML Schema
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        # git-auto-commit-action below needs the persisted credentials to push.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 # zizmor: ignore[artipacked]

      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          experimental: true
          install_args: --locked

      - name: Render schema
        # oxfmt keeps the output identical to the lefthook format-json hook.
        run: |
          go run ./cmd/schema > config.schema.json
          oxfmt config.schema.json

      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "docs: render json schema"
          file_pattern: "config.schema.json"
