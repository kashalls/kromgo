---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build

on:
  push:
    branches:
      - main
  release:
    types:
      - published

jobs:
  build:
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless signing
    # Docker's official reusable workflow: native per-platform runners (arm64 →
    # ubuntu-24.04-arm by default), manifest merge, SBOM, and cosign signing.
    uses: docker/github-builder/.github/workflows/build.yml@17bd7d64200cae4ba58ffc099934e8012ae320f2 # v1.10.0
    with:
      output: image
      push: true
      platforms: linux/amd64,linux/arm64
      sbom: true
      sign: true
      meta-images: ghcr.io/${{ github.repository }}
      # main push → <branch>-<sha>; release → the semver version (e.g. 0.12.0).
      # is_default_branch is false on release/tag refs, so the sha tag is main-only
      # and the semver tag only resolves on a release.
      meta-tags: |
        type=semver,pattern={{version}}
        type=sha,prefix={{branch}}-,enable={{is_default_branch}}
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
