# mise is the single source of truth for the Go toolchain (and project tools)
# across developer shells, CI, and the container build. The `go` version here
# matches go.mod's `go` directive; Renovate keeps the two in lockstep via the
# "Go Toolchain Group" rule in .renovaterc.json5. The Dockerfile and release
# workflow read the Go and Node versions with `mise config get tools.<name>`.
#
# `mise tasks` lists tasks; `mise run <task>` runs one.

[tools]
go = "1.26.4"
golangci-lint = "2.12.2"
helm = "4.2.1"
cosign = "3.1.1"
"aqua:dadav/helm-schema" = "0.23.4"
lefthook = "2.1.9"
node = "24.16.0"
npm = "11.17.0"
oxfmt = "0.54.0"
zizmor = "1.25.2"
helm-docs = "1.14.2"
yq = "4.53.3"

# Vendor the npm packages and build the embedded assets. sources/outputs make this a
# no-op until package-lock.json (or the generator) changes — e.g. a Renovate bump —
# so the depends below stay cheap.
[tasks.assets]
description = "Vendor npm deps and build embedded assets (marked.js, github-markdown.css, MDI + Simple Icons sets, DejaVu Sans + Comic Neue fonts)"
sources = ["package.json", "package-lock.json", "cmd/genassets/main.go"]
outputs = [
  "internal/kromgo/assets/marked.js",
  "internal/kromgo/assets/github-markdown.css",
  "internal/kromgo/assets/mdi.txt.gz",
  "internal/kromgo/assets/si.txt.gz",
  "internal/kromgo/assets/dejavu-sans.ttf",
  "internal/kromgo/assets/dejavu-sans-bold.ttf",
  "internal/kromgo/assets/comic-neue.ttf",
  "internal/kromgo/assets/comic-neue-bold.ttf",
]
run = "npm ci && go run ./cmd/genassets"

[tasks.fmt]
description = "Run go fmt against code"
run = "go fmt ./..."

[tasks.vet]
description = "Run go vet against code"
depends = ["assets"]
run = "go vet ./..."

[tasks.generate]
description = "Regenerate committed generated files (config schema, chart README, values schema)"
run = """
go run ./cmd/schema > config.schema.json && oxfmt config.schema.json
helm-docs --chart-search-root=charts --log-level=warn
# values.schema.json from values.yaml. required/additionalProperties are skipped:
# values.yaml provides every default (so nothing is user-required), and the free-form
# maps (annotations, config.defaults, …) plus the runtime-validated `config` block
# must stay open. --append-newline gives a clean EOF; the file is .prettierignore'd
# (a generated artifact), so oxfmt skips it.
helm-schema --chart-search-root charts/kromgo --skip-auto-generation required,additionalProperties --append-newline
"""

[tasks.generate-check]
description = "Fail if the committed generated files are stale (CI gate)"
run = """
mise run generate
git diff --exit-code config.schema.json charts/kromgo/README.md charts/kromgo/values.schema.json
"""

[tasks.test]
description = "Run tests with coverage"
depends = ["assets"]
run = "go test $(go list ./...) -coverprofile cover.out"

[tasks.test-e2e]
description = "Run end-to-end tests (builds the binary, runs it against a mock Prometheus)"
depends = ["assets"]
run = "go test -tags e2e -timeout 5m -v ./test/e2e/..."

[tasks.test-integration]
description = "Run integration tests against a real Prometheus (set PROMETHEUS_URL)"
depends = ["assets"]
run = "go test -tags integration -timeout 5m -v ./test/integration/..."

[tasks.gallery]
description = "Render a badge/graph styling gallery to kromgo-gallery.html (set PROMETHEUS_URL)"
depends = ["assets"]
run = "go test -tags integration -count=1 -run TestGallery ./test/integration/..."

[tasks.lint]
description = "Run golangci-lint"
depends = ["assets"]
run = "golangci-lint run"

[tasks.lint-fix]
description = "Run golangci-lint with --fix"
depends = ["assets"]
run = "golangci-lint run --fix"

[tasks.helm-lint]
description = "Lint the Helm chart"
run = "helm lint charts/kromgo"

[tasks.helm-unittest]
description = "Run helm-unittest template tests (needs the helm-unittest plugin)"
run = "helm unittest charts/kromgo"

[tasks.helm-test]
description = "Install the chart into the current cluster (e.g. a kind context) and run `helm test`"
# The e2e workflow builds the PR's image, kind-loads it, and sets
# KROMGO_TEST_IMAGE_TAG=e2e + pull policy Never so the test runs the code under
# review; locally these default to the published `latest` for a quick chart check
# (the chart appVersion is a release-time placeholder, so a tag is always needed).
# config.prometheus is never dialed at startup and /readyz is static, so the pod
# becomes Ready without a real Prometheus. The trap cleans up (without --wait,
# which can hang on teardown).
run = """
trap 'helm uninstall kromgo-e2e -n kromgo-e2e >/dev/null 2>&1 || true' EXIT
set -e
helm install kromgo-e2e charts/kromgo -n kromgo-e2e --create-namespace --wait --timeout 5m --set image.tag="${KROMGO_TEST_IMAGE_TAG:-latest}" --set image.pullPolicy="${KROMGO_TEST_PULL_POLICY:-IfNotPresent}"
helm test kromgo-e2e -n kromgo-e2e --logs
"""

[tasks.helm-template]
description = "Render the Helm chart with default values"
run = "helm template kromgo charts/kromgo"

[hooks]
postinstall = "lefthook install"
