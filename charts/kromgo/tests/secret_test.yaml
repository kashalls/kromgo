suite: secret
templates:
  - secret.tpl
tests:
  - it: creates no Secret when prometheusUrl is empty
    asserts:
      - hasDocuments:
          count: 0

  - it: creates a Secret holding PROMETHEUS_URL when set
    set:
      secret.prometheusUrl: https://user:pass@prom.example.com
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: stringData.PROMETHEUS_URL
          value: https://user:pass@prom.example.com

  - it: creates no chart-managed Secret when existingSecret is set
    set:
      secret.existingSecret: my-secret
      secret.prometheusUrl: https://prom
    asserts:
      - hasDocuments:
          count: 0

  - it: renders prometheusUrl through tpl
    set:
      secret.prometheusUrl: https://prom.{{ .Release.Namespace }}.svc
    asserts:
      - equal:
          path: stringData.PROMETHEUS_URL
          value: https://prom.NAMESPACE.svc
