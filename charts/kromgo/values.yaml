---
# Default values for kromgo.
#
# Most values below — strings, lists, and maps, including the `config` block — are
# rendered through Helm's `tpl`, so you can embed template expressions and have them
# resolve at install time, e.g.:
#
#   config:
#     prometheus: http://prometheus-operated.{{ .Release.Namespace }}.svc.cluster.local:9090
#   ingress:
#     hosts:
#       - host: "kromgo.{{ .Values.global.domain }}"
#
# PromQL/CEL use single `{ }`, which pass through untouched; only a *literal* double
# brace needs escaping — write `{{ "{{" }}` for `{{` and `{{ "}}" }}` for `}}`.

# -- Number of kromgo replicas (it queries Prometheus per request and is stateless behind the Service).
replicaCount: 1

image:
  # -- Image repository.
  repository: ghcr.io/home-operations/kromgo
  # -- Image pull policy.
  pullPolicy: IfNotPresent
  # -- Overrides the image tag; defaults to the chart appVersion.
  tag: ""
  # Pins the image by digest (sha256:…). When set it takes precedence over tag;
  # the release pipeline fills it with the published image's digest.

  # -- Pin the image by digest (sha256:…); when set, overrides the tag.
  digest: ""

# -- Image pull secrets for private registries.
imagePullSecrets: []
# -- Override the chart name used in resource names.
nameOverride: ""
# -- Override the full release name.
fullnameOverride: ""

# kromgo's YAML config (endpoint definitions), rendered verbatim into a ConfigMap
# mounted at /config/config.yaml. See https://github.com/home-operations/kromgo
# for the full schema. Set `existingConfigMap` to mount a ConfigMap you manage
# elsewhere instead — the inline `config` below is then ignored; that ConfigMap
# must expose a `config.yaml` key.

# -- Mount an existing ConfigMap (with a `config.yaml` key) instead of the inline `config`; takes precedence over it.
existingConfigMap: ""

# kromgo's YAML config (endpoint definitions), rendered into a ConfigMap and templated through `tpl`.
config:
  # Prometheus base URL kromgo queries. If the URL embeds credentials, leave this
  # empty and use `secret.prometheusUrl` (or `secret.existingSecret`) so it stays
  # out of the ConfigMap — the Secret is injected as PROMETHEUS_URL, which
  # overrides this value.

  # -- Prometheus base URL kromgo queries; use `secret.prometheusUrl` instead when it embeds credentials.
  prometheus: http://prometheus-operated.monitoring.svc.cluster.local:9090

  # The "/" gallery previews every endpoint with copy-paste Markdown. Defaults to
  # enabled; set false to serve a minimal landing page instead.
  gallery:
    # -- Preview every endpoint at "/" with copy-paste Markdown; false serves a minimal landing page.
    enabled: true

  # Cache-Control headers sent with badge/graph responses. One policy applies to
  # every endpoint.
  cache:
    # -- Send Cache-Control headers on badge/graph responses.
    enabled: true
    # -- max-age + s-maxage in seconds (ignored when cache is disabled).
    maxAge: 300

  # -- Defaults applied to every endpoint, each overridable per badge/graph.
  defaults: {}
  #   badge:
  #     style: flat
  #   graph:
  #     theme: dark
  #     fill: true # translucent area beneath every graph's line
  #     valueExpr: string(int(result)) # integer y-axis labels for every graph

  # -- Instant-value endpoints served at /badges/{id}.
  badges: []
  #   - id: cpu
  #     title: CPU
  #     query: round(vector((time() % 1800) / 18))
  #     valueExpr: string(int(result)) + "%"
  #     colorExpr: 'result <= 50.0 ? "green" : result <= 80.0 ? "orange" : "red"'
  #     icon: mdi:cpu-64-bit

  # -- Time-series endpoints served at /graphs/{id}.
  graphs: []
  #   - id: cpu
  #     title: CPU %
  #     query: (time() % 1800) / 18
  #     theme: dark
  #     fill: true # translucent area beneath the line
  #     yMin: 0 # pin the y-axis range (vs auto-fitting); e.g. 0–100 for a percentage
  #     yMax: 100
  #     markLine: [average] # dashed reference line(s): average / min / max / median (first series only)
  #   - id: pods
  #     title: Running Pods
  #     query: sum(kube_pod_status_phase{phase="Running"})
  #     # valueExpr formats the y-axis labels (a CEL expression over `result`, with
  #     # the same humanizers as a badge) — here integer counts instead of the
  #     # default fractional ticks like 42.8.
  #     valueExpr: string(int(result)) + " pods"

# Server tuning — kromgo's runtime environment variables (distinct from the
# config file above). SERVER_HOST/PORT and HEALTH_HOST/PORT are fixed by the
# chart (the Service and probes are wired to 8080 / 8888) and not exposed here.
server:
  # -- QUERY_TIMEOUT — bounds each outbound Prometheus query (Go duration).
  queryTimeout: 30s
  # SERVER_READ_TIMEOUT / SERVER_WRITE_TIMEOUT — Go durations bounding request read
  # and response write on the public listener. The defaults harden against slow-client
  # (Slowloris-style) connection holding; set either to "0" to disable its deadline.

  # -- SERVER_READ_TIMEOUT (Go duration); "0" disables the read deadline.
  readTimeout: 15s
  # -- SERVER_WRITE_TIMEOUT (Go duration, must exceed queryTimeout); "0" disables it.
  writeTimeout: 60s
  # -- SERVER_LOGGING — per-request access logging.
  logging: false
  # -- Extra raw env vars merged into the container (advanced), e.g. GOMEMLIMIT.
  extraEnv: []
  # - name: GOMEMLIMIT
  #   value: "200MiB"

# Sensitive Prometheus URL — use when the endpoint embeds basic-auth credentials
# you don't want in the ConfigMap. Provide it inline and a Secret is created, or
# point at an existing Secret with a PROMETHEUS_URL key. Leave empty to use the
# plain `config.prometheus` above.
secret:
  # Pre-existing Secret with a PROMETHEUS_URL key. Takes precedence over the
  # inline value below.

  # -- Existing Secret with a PROMETHEUS_URL key; takes precedence over the inline value below.
  existingSecret: ""
  # -- PROMETHEUS_URL — sensitive Prometheus URL; overrides config.prometheus when set.
  prometheusUrl: ""

serviceAccount:
  # -- Create a ServiceAccount.
  create: true
  # kromgo talks only to Prometheus over HTTP, never to the Kubernetes API, so it
  # has no use for a mounted ServiceAccount token. Disabled by default for least
  # privilege; set true only if you add sidecars/tooling that need API access.

  # -- Automount the ServiceAccount API token (off by default: kromgo talks to Prometheus, not the cluster API).
  automount: false
  # -- Annotations for the ServiceAccount.
  annotations: {}
  # -- ServiceAccount name; generated from the release name if empty.
  name: ""

# -- Annotations added to the pod.
podAnnotations: {}
# -- Labels added to the pod.
podLabels: {}

# -- Pod-level securityContext (runs as non-root uid/gid 65532 with the RuntimeDefault seccomp profile).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# -- Container securityContext (no privilege escalation, read-only root filesystem, drops ALL capabilities).
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  # -- Service type.
  type: ClusterIP
  # -- Badge / graph / gallery port.
  port: 8080
  # -- Health + /metrics port.
  metricsPort: 8888

ingress:
  # -- Expose the UI via an Ingress.
  enabled: false
  # -- IngressClass name.
  className: ""
  # -- Ingress annotations.
  annotations: {}
  # -- Ingress hosts and their paths.
  hosts:
    - host: kromgo.example.com
      paths:
        - path: /
          pathType: Prefix
  # -- Ingress TLS configuration.
  tls: []
  # - secretName: kromgo-tls
  #   hosts:
  #     - kromgo.example.com

# Gateway API HTTPRoute — an alternative to `ingress` for clusters using the
# Gateway API. Renders one HTTPRoute pointing at the app service port. Named
# `httpRoute` (not `route`) to avoid confusion with the OpenShift Route kind.
httpRoute:
  # -- Expose the UI via a Gateway API HTTPRoute (alternative to ingress).
  enabled: false
  # -- HTTPRoute apiVersion; empty defaults to gateway.networking.k8s.io/v1.
  apiVersion: ""
  # -- HTTPRoute kind; empty defaults to HTTPRoute.
  kind: ""
  # -- HTTPRoute annotations.
  annotations: {}
  # -- HTTPRoute labels.
  labels: {}
  # -- Gateways (and listeners) this route attaches to.
  parentRefs: []
  #  - name: gateway
  #    namespace: gateway
  #    sectionName: https
  # -- Hostnames matched against the Host header (templated).
  hostnames: []
  #  - kromgo.example.com
  # -- Custom rules prepended before the default rule (templated).
  additionalRules: []
  # -- Filters applied to the default rule.
  filters: []
  # -- Match conditions for the default rule.
  matches:
    - path:
        type: PathPrefix
        value: /
  # Redirect HTTP→HTTPS (301) instead of routing to the backend. Requires a
  # Gateway with both HTTP and HTTPS listeners; matches/filters are ignored.

  # -- Redirect HTTP→HTTPS (301) instead of routing to the backend (needs HTTP+HTTPS listeners).
  httpsRedirect: false

# -- Pod resource requests/limits.
resources: {}
# limits:
#   memory: 256Mi
# requests:
#   cpu: 10m
#   memory: 64Mi

# -- Liveness probe.
livenessProbe:
  httpGet:
    path: /healthz
    port: health
  initialDelaySeconds: 10
  periodSeconds: 20
# -- Readiness probe.
readinessProbe:
  httpGet:
    path: /readyz
    port: health
  initialDelaySeconds: 5
  periodSeconds: 10

monitoring:
  serviceMonitor:
    # -- Create a Prometheus Operator ServiceMonitor (requires its CRDs).
    enabled: false
    # -- Scrape interval.
    interval: 30s
    # -- Scrape timeout.
    scrapeTimeout: 10s
    # -- Metrics path.
    path: /metrics
    # -- ServiceMonitor labels.
    labels: {}
    # -- ServiceMonitor annotations.
    annotations: {}
    # -- Prometheus metric relabelings.
    metricRelabelings: []
    # -- Prometheus relabelings.
    relabelings: []

# -- Node selector for pod scheduling.
nodeSelector: {}
# -- Tolerations for pod scheduling.
tolerations: []
# -- Affinity rules for pod scheduling.
affinity: {}

# -- Additional volumes on the Deployment.
volumes: []
# -- Additional volume mounts on the container.
volumeMounts: []

# Config for the chart's `helm test` hook (a pod that curls the Service's /readyz). Used only by `helm test`, never the workload.
tests:
  image:
    # -- `helm test` pod image; needs a shell with wget (kromgo's own image is from scratch).
    repository: mirror.gcr.io/busybox
    # -- `helm test` image, pinned as `tag@sha256:digest` so Renovate bumps the tag and its digest together.
    tag: "1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d"
    # -- `helm test` image pull policy.
    pullPolicy: IfNotPresent
