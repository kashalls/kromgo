[[remotes]]
git_url = "https://github.com/home-operations/.github"
ref = "main"
configs = ["lefthook.common.toml"]

# Regenerate the committed JSON schemas whenever their sources change — the config
# model/generator (config.schema.json) or the chart values (values.schema.json) — so
# both stay in sync within the same commit. CI verifies it.
[pre-commit.commands.config-schema]
glob = ["internal/config/*.go", "cmd/schema/*.go", "charts/kromgo/values.yaml"]
run = "mise run generate && git add config.schema.json charts/kromgo/values.schema.json"
